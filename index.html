<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안심클로버가 부착된 에스원 차량을 찾고 인증샷을 찍어 응모하세요.🍀</title>

    <!-- [Open Graph: 카카오톡 미리보기 설정] -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://midoseo.github.io/event/">
    <meta property="og:title" content="안심클로버가 부착된 에스원 차량을 찾고 인증샷을 찍어 응모하세요.🍀">
    <meta property="og:description" content="📢기간: 5.21(목)~6.7(일), 상세사항은 링크를 눌러 확인✨">
    
    <!-- 카카오톡 목록에 보일 큰 이미지 (1200x630) -->
    <meta property="og:image" content="https://raw.githubusercontent.com/midoseo/event/refs/heads/main/%EC%95%88%EC%8B%AC%ED%81%B4%EB%A1%9C%EB%B2%84(%EC%88%9C%EA%B8%88%ED%95%9C%EB%8F%88).png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .event-container {
            width: 100%;
            max-width: 600px; /* 모바일 가독성을 위한 최대 폭 */
            cursor: pointer;
        }
        .event-container img {
            width: 100%;
            display: block;
            height: auto;
        }
        /* 클릭 유도 안내 문구 (선택 사항) */
        .tap-notice {
            text-align: center;
            padding: 15px;
            background: #fff;
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 클릭하면 실제 이벤트 페이지로 이동 -->
    <div class="event-container" onclick="location.href='https://t2m.kr/withS1'">
        <div class="tap-notice">이미지를 터치하면 응모 페이지로 연결됩니다. 👇</div>
        
        <!-- 웹페이지에서 보여줄 안내 이미지 (og-image와 같은 것을 써도 되고, 세로로 긴 다른 이미지를 써도 됩니다) -->
        <img src="https://github.com/midoseo/event/blob/main/%EC%95%88%EC%8B%AC%ED%81%B4%EB%A1%9C%EB%B2%84_%ED%95%A9%EB%B3%B8%20%EB%B3%B5%EC%82%AC_FFF.png?raw=true">
    </div>

</body>
</html>
